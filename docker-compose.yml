services:
  app:
    build: .
    container_name: clinical-data-studio-app
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - cds_data:/app/data
      - cds_backups:/app/backups
      - cds_logs:/app/logs
      - cds_uploads:/app/uploads
    expose:
      - "8765"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "server.py", "healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 5

  db:
    image: postgres:16-alpine
    container_name: clinical-data-studio-db
    environment:
      POSTGRES_DB: clinical_data_studio
      POSTGRES_USER: clinical
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clinical -d clinical_data_studio"]
      interval: 10s
      timeout: 5s
      retries: 10

  nginx:
    image: nginx:1.27-alpine
    container_name: clinical-data-studio-nginx
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/clinical-data-studio.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_www:/var/www/certbot
      - letsencrypt:/etc/letsencrypt
    restart: unless-stopped

  certbot:
    image: certbot/certbot:latest
    profiles: ["certbot"]
    volumes:
      - certbot_www:/var/www/certbot
      - letsencrypt:/etc/letsencrypt

volumes:
  postgres_data:
  cds_data:
  cds_backups:
  cds_logs:
  cds_uploads:
  certbot_www:
  letsencrypt:
