name: Clinical Data Studio CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Python syntax check
        run: python -m py_compile server.py config.py storage.py

      - name: Frontend syntax check
        run: node --check static/app.js

      - name: Unit and API tests
        run: python -W error::ResourceWarning -m unittest discover -s tests

      - name: SQLite healthcheck
        run: python server.py healthcheck

      - name: Browser smoke test
        shell: pwsh
        run: ./tests/browser_smoke.ps1

      - name: Docker build
        run: docker build -t clinical-data-studio:ci .

      - name: Compose config check
        run: docker compose -f docker-compose.local.yml config
